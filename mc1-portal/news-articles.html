<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirect</title>
  <link rel="stylesheet" href="css/cia-theme.css" />
  <script>
  (function () {
    var q = new URLSearchParams(location.search);
    var outlet = q.get("outlet") || "";
    if (outlet) {
      location.replace("archive.html#/news/" + encodeURIComponent(outlet));
    }
  })();
  </script>
</head>
<body>
  <header class="site-nav">
    <a href="index.html">HQ</a>
    <a href="archive.html">Archive</a>
  </header>
  <div class="container" style="padding: 2rem 1.25rem">
    <p style="color: var(--text)">News browsing now lives in the <a href="archive.html">integrated archive</a>. If you are not redirected automatically, open that page and choose an outlet under <em>News outlets</em>.</p>
  </div>
</body>
</html>
